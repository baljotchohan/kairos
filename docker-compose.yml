version: "3.9"

# KAIROS — Company Organizational Memory OS
# docker-compose up --build
#
# Services:
#   kairos-api      → FastAPI backend on port 8000
#   kairos-frontend → Next.js frontend on port 3000
#
# Data persists across restarts via ./data volume mount.
# Copy .env.example to .env and fill in your API keys before running.

services:
  kairos-api:
    build: .
    container_name: kairos-api
    ports:
      - "8000:8000"
    volumes:
      # Single ./data mount for all persistent storage
      - ./data:/app/data
    env_file:
      - .env
    environment:
      # Override paths to use the mounted data volume
      - CHROMA_PERSIST_DIR=/app/data/chroma_db
      - SQLITE_PATH=/app/data/kairos.db
      - OBSIDIAN_VAULT=/app/data/obsidian_vault
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  kairos-frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* vars must be baked in at build time (not runtime env)
        NEXT_PUBLIC_API_URL: http://kairos-api:8000
        NEXT_PUBLIC_WS_URL: ws://kairos-api:8000
    container_name: kairos-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      kairos-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
